# 复制本文件为 config.yaml 后修改

timezone: Asia/Shanghai

git:
  # 要扫描的 Git 仓库绝对路径（填你日常写代码、有 .git 的项目）
  # 采集范围：仓库内所有本地/远程跟踪分支（git log --all），不限当前检出分支
  repos:
    - D:/javaPro/your-project-name
    # - D:/javaPro/another-project
  # 本工具目录 daily-work-digest 若未 git init，不要配置在这里
  # 可选：仅采集指定邮箱的提交；留空则采集仓库内所有作者
  author_email: ""
  # 是否排除 merge commit
  exclude_merges: true
  # commit message 正则，命中则跳过
  exclude_patterns:
    - "^Merge "
    - "^wip"
    - "^WIP"
    - "^temp:"
    - "^temp "

manual:
  enabled: true

# 企业微信日程（CalDAV，方式 1）
# 手机：工作台 → 日程 → … → 同步至其他日历 → 复制用户名/密码
wecom:
  enabled: false
  caldav:
    server: https://caldav.wecom.work
    username: ""
    password: ""
    # 可选：企微日历数字 ID，403 时可填。路径形如 /calendar/1688855375594291/
    calendar_id: ""

# 飞书
feishu:
  # 日程（CalDAV）：飞书桌面端 日历 → 设置 → CalDAV 同步
  enabled: false
  caldav:
    server: https://caldav.feishu.cn
    username: ""
    password: ""
    # 可选：日历 ID，403 时可填
    calendar_id: ""
  # IM（开放平台 API）：需自建应用 + 申请权限，见 docs/飞书IM采集-用户指南.md
  chat:
    enabled: false
    app_id: ""
    app_secret: ""
    base_url: https://open.feishu.cn
    # 群聊 open_chat_id（机器人须已入群）；单聊填 p2p_chat_ids
    chat_ids: []
    p2p_chat_ids: []
    # 过滤：仅采集自己发送 / @ 自己的消息（需填 my_open_id）
    only_my_messages: false
    only_mention_me: false
    my_open_id: ""
    keywords: []
    exclude_keywords: []
    page_size: 50
    max_pages: 20
  # 文档（搜索 API）：需 OAuth 用户授权，见 docs/飞书文档采集-用户指南.md
  docs:
    enabled: false
    app_id: ""
    app_secret: ""
    base_url: https://open.feishu.cn
    # OAuth token 缓存在项目目录（运行 feishu_oauth.py 后自动生成，勿提交 Git）
    token_cache: data/.feishu_oauth.json
    redirect_uri: http://127.0.0.1:8765/callback
    query: ""
    include_types:
      - DOC
      - DOCX
      - SHEET
      - BITABLE
      - WIKI
      - MINDNOTE
      - SLIDES
    page_size: 20
    max_pages: 10
    search_padding_days: 7

# 语雀文档：Token 或 Cookie 二选一，见 docs/语雀文档采集-用户指南.md
yuque:
  docs:
    enabled: false
    # 认证方式：token | cookie（二选一，填对应字段即可）
    auth_mode: token
    token: ""
    cookie: ""
    api_base: https://www.yuque.com/api/v2
    # repos 留空 = 自动扫描账号下知识库（推荐）；也可填白名单缩小范围
    auto_repos: true
    max_auto_repos: 50
    repos: []
    # repos:
    #   - your-team/your-book-slug
    only_my_edits: true
    use_content_updated_at: true
    also_use_updated_at: true
    page_limit: 100
    max_pages: 20

# 钉钉日程（CalDAV）
# PC 端钉钉：日历 → 设置 → CalDAV 同步 → 生成专用账号密码
dingtalk:
  enabled: false
  caldav:
    server: https://caldav.mxhichina.com
    username: ""
    password: ""
    # 可选：日历 ID，403 时可填
    calendar_id: ""

# 禅道（Bug / 需求 / 任务）：见 docs/禅道采集-用户指南.md
zentao:
  enabled: false
  base_url: https://zentao.your-company.com
  account: ""   # 可选：禅道登录名，Agent 代登录时可少问一项
  # 密码仅登录时用，不写 config；token 缓存 data/.zentao_token.json
  token_cache: data/.zentao_token.json

# Jira 私有化 Server/Data Center：见 docs/Jira采集-用户指南.md
jira:
  enabled: false
  base_url: https://jira.your-company.com
  username: ""        # Jira 登录名（建议填写，与 PAT 配合 Basic 认证）
  api_token: ""       # Personal Access Token；或写入 data/.jira_token.json
  token_cache: data/.jira_token.json
  project_keys: []    # 留空=全部项目；如 ["PROJ", "QA"]
  only_my_activity: true

tags:
  commit_fix: ["开发", "bugfix"]
  commit_feat: ["开发", "功能"]
  commit_docs: ["文档"]
  commit_refactor: ["开发", "重构"]
  manual_meeting: ["会议", "协作"]
  manual_default: ["协作"]
  calendar_meeting: ["会议", "协作"]
  feishu_chat: ["协作", "沟通"]
  feishu_docs: ["文档", "产出"]
  yuque_docs: ["文档", "产出"]
  zentao_bug: ["测试", "bug"]
  zentao_story: ["产品", "需求"]
  zentao_task: ["开发", "任务"]
  jira_bug: ["测试", "bug"]
  jira_story: ["产品", "需求"]
  jira_task: ["开发", "任务"]
  jira_issue: ["协作", "issue"]
